<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>永續發展題庫系統</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding-top: 50px; }
        
        /* 卡片共用樣式 */
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: center; }
        
        /* 1. 入口頁面樣式 */
        #home-page h1 { color: var(--primary); margin-bottom: 30px; font-size: 28px; }
        .select-group { margin: 30px 0; }
        select { width: 100%; padding: 12px; font-size: 18px; border-radius: 10px; border: 2px solid #e2e8f0; cursor: pointer; outline: none; transition: 0.3s; }
        select:focus { border-color: var(--primary); }
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 12px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        .start-btn:hover { background: #4338ca; transform: translateY(-2px); }

        /* 2. 測驗頁面樣式 (預設隱藏) */
        #quiz-page { display: none; text-align: left; }
        h2 { color: #1e293b; line-height: 1.5; font-size: 20px; margin-top: 10px; min-height: 3.5em; }
        
        .option-btn { 
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin: 12px 0; padding: 16px; 
            border: 2px solid #f1f5f9; border-radius: 12px; background: #fff; 
            cursor: pointer; transition: 0.2s; text-align: left; font-size: 16px;
        }
        .option-btn:hover:not([disabled]) { border-color: #cbd5e1; background: #f8fafc; }
        
        .correct { border-color: #22c55e !important; background-color: #f0fdf4 !important; color: #166534 !important; font-weight: bold; }
        .wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #991b1b !important; }
        
        .icon { width: 22px; height: 22px; display: none; flex-shrink: 0; }
        .correct .icon-check { display: block; fill: #22c55e; }
        .wrong .icon-cross { display: block; fill: #ef4444; }

        .nav-controls { display: flex; justify-content: space-between; margin-top: 30px; }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .nav-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .exit-btn { background: #94a3b8; margin-top: 20px; width: 100%; }

        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--primary); transition: 0.3s; width: 0%; }
        
        /* 3. 結果頁面 */
        .score-area { display: none; }
    </style>
</head>
<body>

<div id="home-page" class="card">
    <h1>🌱 永續發展測驗系統</h1>
    <p style="color: #64748b;">請選擇您要練習的題庫期數：</p>
    <div class="select-group">
        <select id="quiz-select"></select>
    </div>
    <button class="start-btn" onclick="startQuiz()">開始進入測驗</button>
</div>

<div id="quiz-page" class="card">
    <div class="progress-bar"><div class="progress-inner" id="pb-inner"></div></div>
    <div id="quiz-content">
        <div id="progress-text" style="font-weight: bold; color: var(--primary);"></div>
        <h2 id="question-text">載入中...</h2>
        <div id="options-container"></div>
        
        <div class="nav-controls">
            <button class="nav-btn" style="background:#64748b" id="prev-btn" onclick="prevQuestion()">上一題</button>
            <button class="nav-btn" id="next-btn" onclick="nextQuestion()">下一題</button>
        </div>
        <button class="nav-btn exit-btn" onclick="goToHome()">中途結束 / 返回選單</button>
    </div>

    <div class="score-area" id="result-area" style="text-align: center;">
        <h1 style="color: var(--primary);">測驗完成！</h1>
        <p id="score-text" style="font-size: 24px; margin: 30px 0; font-weight: bold;"></p>
        <button class="start-btn" onclick="goToHome()">返回主選單</button>
    </div>
</div>

<svg style="display:none;">
    <symbol id="check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></symbol>
    <symbol id="cross" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></symbol>
</svg>

<script src="data.js"></script>
<script>
    let currentQuizKey = ""; 
    let activeData = [];
    let currentIdx = 0;
    let score = 0;
    let userAnswers = [];

    // 初始化：載入下拉選單
    window.onload = function() {
        const select = document.getElementById('quiz-select');
        Object.keys(allQuizData).forEach(key => {
            const opt = document.createElement('option');
            opt.value = key;
            opt.innerText = key + " 題庫";
            select.appendChild(opt);
        });
    };

    function startQuiz() {
        currentQuizKey = document.getElementById('quiz-select').value;
        activeData = allQuizData[currentQuizKey];
        
        // 初始化參數
        currentIdx = 0;
        score = 0;
        userAnswers = new Array(activeData.length).fill(null);
        
        // 切換畫面
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('quiz-page').style.display = 'block';
        document.getElementById('quiz-content').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';
        
        loadQuestion();
    }

    function goToHome() {
        if(confirm("確定要返回主選單嗎？目前的進度將不會儲存。")) {
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('quiz-page').style.display = 'none';
        }
    }

    function loadQuestion() {
        const q = activeData[currentIdx];
        
        // 更新進度條與文字
        const progressPercent = ((currentIdx + 1) / activeData.length) * 100;
        document.getElementById('pb-inner').style.width = progressPercent + "%";
        document.getElementById('progress-text').innerText = `${currentQuizKey} 期 - 第 ${currentIdx + 1} 題`;
        document.getElementById('question-text').innerText = q.question;
        
        const optionsDiv = document.getElementById('options-container');
        optionsDiv.innerHTML = '';
        
        document.getElementById('prev-btn').disabled = (currentIdx === 0);
        document.getElementById('next-btn').innerText = (currentIdx === activeData.length - 1) ? "查看總分" : "下一題";

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span>${opt}</span>
                <svg class="icon icon-check"><use xlink:href="#check"></use></svg>
                <svg class="icon icon-cross"><use xlink:href="#cross"></use></svg>`;
            
            if (userAnswers[currentIdx] !== null) {
                applyStyle(btn, opt, q.answer, userAnswers[currentIdx]);
                btn.disabled = true;
            } else {
                btn.onclick = () => handleSelect(opt);
            }
            optionsDiv.appendChild(btn);
        });
    }

    function handleSelect(selected) {
    userAnswers[currentIdx] = selected;
    const q = activeData[currentIdx];
    
    // 判斷是否答對：支援單一字串或陣列比對
    let isCorrect = false;
    if (Array.isArray(q.answer)) {
        isCorrect = q.answer.includes(selected);
    } else {
        isCorrect = (selected === q.answer);
    }

    if (isCorrect) score++;

    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(btn => {
        const btnText = btn.querySelector('span').innerText;
        applyStyle(btn, btnText, q.answer, selected);
        btn.disabled = true;
    });
}

function applyStyle(btn, btnText, correctAns, userSelect) {
    // 檢查正確答案（支援陣列）
    const isThisCorrect = Array.isArray(correctAns) 
        ? correctAns.includes(btnText) 
        : btnText === correctAns;

    if (isThisCorrect) {
        btn.classList.add('correct'); // 只要是正確答案，通通變綠框
    }

    // 如果使用者選的這個選項不在正確答案內，變紅框
    const userIsWrong = Array.isArray(correctAns)
        ? !correctAns.includes(userSelect)
        : userSelect !== correctAns;

    if (btnText === userSelect && userIsWrong) {
        btn.classList.add('wrong');
    }
}

    function nextQuestion() {
        if (userAnswers[currentIdx] === null) { alert("請先完成本題作答！"); return; }
        if (currentIdx < activeData.length - 1) {
            currentIdx++;
            loadQuestion();
        } else {
            showResult();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) { currentIdx--; loadQuestion(); }
    }

    function showResult() {
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        const percent = Math.round(score/activeData.length*100);
        document.getElementById('score-text').innerHTML = `得分：${score} / ${activeData.length}<br><span style="font-size:48px; color:#22c55e;">${percent} 分</span>`;
    }
</script>
</body>
</html>
